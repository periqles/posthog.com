name: Deploy preview to Cloudflare Pages

on:
    pull_request:
        types: [opened, synchronize, reopened, labeled]

concurrency:
    group: deploy-preview-${{ github.event.pull_request.number }}
    cancel-in-progress: true

env:
    NODE_OPTIONS: '--max_old_space_size=12288'

jobs:
    build-and-deploy:
        name: Build & deploy preview
        runs-on: depot-ubuntu-latest-8
        timeout-minutes: 45
        if: ${{ !github.event.pull_request.head.repo.fork }}
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Find existing comment
              uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
              id: find-comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: '<!-- cloudflare-pages-preview -->'

            - name: Get timestamp
              id: timestamp
              run: echo "time=$(date -u +'%b %d, %Y %I:%M%p')" >> $GITHUB_OUTPUT

            - name: Comment pending
              id: comment
              uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      <!-- cloudflare-pages-preview -->
                      ### Deploy preview

                      | Status | Details | Updated (UTC) |
                      |--------|---------|---------|
                      | 🟡 **Building** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) | ${{ steps.timestamp.outputs.time }} |

            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Set up pnpm
              uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: '22'
                  cache: 'pnpm'

            # Gatsby builds cold (no .cache restore). Restoring a warm .cache across builds with
            # differing MDX content caused gatsby-plugin-mdx incoherence ("Can't resolve …mdx",
            # "X is not defined"); cold builds are reliable. We still restore the small Cloudinary
            # metadata file (produced by the cache-warmup job) to skip the ~140s onPreInit crawl.
            - name: Restore Cloudinary metadata cache
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: .cloudinary-resources.json
                  key: cloudinary-${{ github.run_id }}
                  restore-keys: |
                      cloudinary-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build site
              run: pnpm build
              env:
                  GATSBY_MINIMAL: 'true'
                  # Emit the static/dynamic module graph so the eager-graph check below can
                  # measure the app shell. Reuses this single PR build — no second build.
                  EMIT_WEBPACK_STATS: 'true'
                  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
                  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

            # Bundle + eager-graph report. Runs off the build above, so it adds no build to
            # the PR. The master baseline (for deltas) is produced by bundle-baseline.yml and
            # restored from cache here; absent a baseline the comment shows absolute sizes.
            - name: Restore bundle baseline from master
              if: success()
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: bundle-report/baseline
                  key: bundle-baseline-${{ github.event.pull_request.base.sha }}
                  restore-keys: |
                      bundle-baseline-

            - name: Measure bundle size and eager graph
              if: success()
              run: |
                  node scripts/bundle/bundle-size-report.mjs
                  node scripts/bundle/check-eager-graph.mjs --report-only
                  node scripts/bundle/build-bundle-comment.mjs

            - name: Upload bundle report
              if: success()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: bundle-report
                  path: bundle-report/
                  retention-days: 7

            - name: Find bundle report comment
              if: success()
              uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
              id: find-bundle-comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: '<!-- bundle-size-report -->'

            - name: Post bundle report comment
              if: success()
              uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.find-bundle-comment.outputs.comment-id }}
                  edit-mode: replace
                  body-path: bundle-report/comment.md

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: pnpm
                  command: pages deploy public --project-name=posthog-preview --branch=pr-${{ github.event.pull_request.number }}

            - name: Get timestamp (final)
              if: always()
              id: timestamp-final
              run: echo "time=$(date -u +'%b %d, %Y %I:%M%p')" >> $GITHUB_OUTPUT

            - name: Comment on success
              if: success()
              uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      <!-- cloudflare-pages-preview -->
                      ### Deploy preview

                      | Status | Details | Updated (UTC) |
                      |--------|---------|---------|
                      | 🟢 **Ready** | [View preview](${{ steps.deploy.outputs.deployment-url }}) | ${{ steps.timestamp-final.outputs.time }} |

            - name: Notify reviewer on successful builds (Inkeep PRs only)
              if: success() && contains(github.event.pull_request.user.login, 'inkeep')
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const reviewers = pr.requested_reviewers.map(r => `@${r.login}`).join(', ');
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: pr.number,
                        body: `Hey ${reviewers}! This docs PR was generated for you by an agent. You're responsible for reviewing and merging it into production.\n\n1. Review and approve the PR\n2. Merge the PR\n   a. Check the preview env and CI build and merge it yourself\n   b. Enable auto-merge if you're confident in the changes`
                      });

            - name: Notify reviewer on build failure (Inkeep PRs only)
              if: failure() && contains(github.event.pull_request.user.login, 'inkeep')
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
              with:
                  script: |
                      const pr = context.payload.pull_request;
                      const reviewers = pr.requested_reviewers.map(r => `@${r.login}`).join(', ');
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: pr.number,
                        body: `Hey ${reviewers}! This docs PR was generated for you by an agent. You're responsible for reviewing and merging it into production.\n\nThe deploy preview failed to build. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) to see what went wrong. If it looks like a flaky failure, re-run the workflow.`
                      });

            - name: Comment on failure
              if: failure()
              uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-id: ${{ steps.comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      <!-- cloudflare-pages-preview -->
                      ### Deploy preview

                      | Status | Details | Updated (UTC) |
                      |--------|---------|---------|
                      | 🔴 **Failed** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) | ${{ steps.timestamp-final.outputs.time }} |

                      Push a fix or re-run the workflow to try again.

                      <details><summary>Common culprits</summary>

                      - **MDX issues** - unescaped `<`/`>` characters, unclosed tags, or malformed JSX
                      - **External API timeouts** - GitHub, Strapi, or Ashby occasionally hiccup
                      </details>
